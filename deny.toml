[graph]
targets = []
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unlicense",
    "Unicode-3.0",
    "0BSD",
    "BSL-1.0",
    "PolyForm-Noncommercial-1.0.0",
]
confidence-threshold = 0.8

[advisories]
ignore = [
    "RUSTSEC-2024-0436", # paste: unmaintained, transitive dep via faer/gemm — no fix available
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
