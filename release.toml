# cargo-release configuration
# Install: cargo install cargo-release
# Usage:   cargo release --dry-run       (preview)
#          cargo release patch           (bump + tag)
#
# IMPORTANT: publish is disabled workspace-wide. When we are ready to publish
# to crates.io, change the workspace-level publish to true. surge-py and
# surge-bindings should remain publish = false permanently.

[workspace]
# Safety: do not publish any crate until we explicitly enable it.
publish = false

# All workspace crates share a single version number.
shared-version = true

# Single commit for all version bumps across the workspace.
consolidate-commits = true

# Tag format: v0.1.0, v0.2.0, etc.
tag-name = "v{{version}}"

# Commit message for version bump.
pre-release-commit-message = "chore(release): bump version to {{version}}"

# Push the commit and tag to the remote.
push = true
tag = true

# When bumping a workspace crate, upgrade dependents to match.
dependent-version = "upgrade"

# Generate changelog before tagging.
pre-release-hook = ["git-cliff", "--output", "CHANGELOG.md"]
